openapi: 3.1.0
info:
  title: Ingredient
  #  description: Title
  version: 1.0.0
servers:
  - url: 'https://localhost:8080'


components:
  responses:
    ingredientNotFound:
      description: ingredient not found.
      content:
        text/plain:
          schema:
            type: string
            example: "Ingredient.id=1 is not found"

  schemas:
    ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "tomate"
        category:
          type: string
          enum: [ VEGETABLE, ANIMAL, MARINE, DAIRY, OTHER ]
        price:
          type: number
          example: 300.0
        stockMovement:
          type: array
          items:
            $ref: "#/components/schemas/stockMovement"
    stockMovement:
      type: object
      properties:
        id:
          type: integer
          example: 1
        stockValue:
          $ref: "#/components/schemas/stockValue"
        movement_type:
          type: string
          enum: [ in,out ]
        creation_datetime:
          type: string
          format: date
    stockValue:
      type: object
      properties:
        quantity:
          type: number
          example: 1.4
        unit:
          type: string
          enum: [ PCS, KG, L ]



paths:
  /ingredients:
    get:
      description: return all ingredient
      responses:
        '200':
          description: a list of ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ingredient"
  /ingredients/{id}:
    get:
      description: find ingredient by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1

      responses:
        '200':
          description: find ingredient by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ingredient"
        '404':
          $ref: "#/components/responses/ingredientNotFound"


  /ingredients/{id}/stock:
    get:
      description: get stock of ingredient at a specific date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1

        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date

        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [ PCS, KG, L ]
      responses:
        '200':
          description: return quantity and unity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/stockValue"
        '404':
          $ref: "#/components/responses/ingredientNotFound"
        '400':
          description: bad request
          content:
            text/plain:
              schema:
                type: string
                example: "Either mandatory query parameter `at` or `unit` is not provided."






